
{% extends "base.html" %}
{% load static %}
{% block content %}
    
<p>
    <a class="btn btn-light" href="{% url 'app_employee_work_time_list' %}">
    work_time Listing
    </a>
</p>
    
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{form.errors}}
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="work_type">work_type: </label>
      <input class="form-control col-sm-10"
         id="work_type" type="number"
         name="work_type" value="{{ object.work_type }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="hours_worked">hours_worked: </label>
      <input class="form-control col-sm-10"
         id="hours_worked" type="number"
         name="hours_worked" value="{{ object.hours_worked }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="created">created: </label>
      <input class="form-control col-sm-10"
         id="created" type="datetime-local"
         name="created" value="{{ object.created }}" disabled>
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="day_of_week">day_of_week: </label>
      <input class="form-control col-sm-10"
         id="day_of_week" type="number"
         name="day_of_week" value="{{ object.day_of_week }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="id">id: </label>
      <input class="form-control col-sm-10"
         id="id" type="text"
         name="id" value="{{ object.id }}" disabled>
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="job_number">job_number: </label>
      <input class="form-control col-sm-10"
         id="job_number" type="text"
         name="job_number" value="{{ object.job_number }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="job_description">job_description: </label>
      <input class="form-control col-sm-10"
         id="job_description" type="text"
         name="job_description" value="{{ object.job_description }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="last_updated">last_updated: </label>
      <input class="form-control col-sm-10"
         id="last_updated" type="datetime-local"
         name="last_updated" value="{{ object.last_updated }}" disabled>
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="job_phase">job_phase: </label>
      <input class="form-control col-sm-10"
         id="job_phase" type="text"
         name="job_phase" value="{{ object.job_phase }}">
  </div>
  <div class="form-group row">
      <label class="col-sm-2 col-form-label" for="job_category">job_category: </label>
      <input class="form-control col-sm-10"
         id="job_category" type="text"
         name="job_category" value="{{ object.job_category }}">
  </div>
  <input type="submit" value="Save" class="btn btn-primary">
</form>

{% endblock %}
